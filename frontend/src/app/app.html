<div class="flex min-h-dvh flex-col bg-gray-50 text-gray-900 dark:bg-neutral-950 dark:text-neutral-100">
  <main class="mx-auto w-full max-w-xl flex-1 pb-20">
    <router-outlet />
  </main>

  @if (showNav()) {
    <nav
      class="fixed inset-x-0 bottom-0 z-10 border-t border-gray-200 bg-white/90 backdrop-blur dark:border-neutral-800 dark:bg-neutral-900/90"
    >
      <div class="mx-auto grid max-w-xl grid-cols-4">
        <a
          routerLink="/"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="text-blue-600 dark:text-blue-400"
          class="flex flex-col items-center gap-0.5 py-2 text-xs text-gray-500 dark:text-neutral-400"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.75 12 4l8.25 5.75M5 8.5V19a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8.5" />
          </svg>
          Bestand
        </a>
        <a
          routerLink="/shopping"
          routerLinkActive="text-blue-600 dark:text-blue-400"
          class="relative flex flex-col items-center gap-0.5 py-2 text-xs text-gray-500 dark:text-neutral-400"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 3h2l2.2 12.2a1.5 1.5 0 0 0 1.5 1.3h8.6a1.5 1.5 0 0 0 1.5-1.2L21 7H6M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" />
          </svg>
          @if (shopping.items().length > 0) {
            <span class="absolute right-6 top-1 rounded-full bg-blue-600 px-1.5 text-[10px] font-semibold text-white">
              {{ shopping.items().length }}
            </span>
          }
          Einkauf
        </a>
        <a
          routerLink="/archive"
          routerLinkActive="text-blue-600 dark:text-blue-400"
          class="flex flex-col items-center gap-0.5 py-2 text-xs text-gray-500 dark:text-neutral-400"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.5 7.5h17M4.5 7.5 6 20a1 1 0 0 0 1 .9h10a1 1 0 0 0 1-.9l1.5-12.5M4 7.5 5 4h14l1 3.5M10 12h4" />
          </svg>
          Archiv
        </a>
        <a
          routerLink="/settings"
          routerLinkActive="text-blue-600 dark:text-blue-400"
          class="flex flex-col items-center gap-0.5 py-2 text-xs text-gray-500 dark:text-neutral-400"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.4 13.5a7.7 7.7 0 0 0 0-3l1.8-1.4-1.8-3.1-2.2.9a7.5 7.5 0 0 0-2.6-1.5L12 2h-3.6l-.5 2.4a7.5 7.5 0 0 0-2.6 1.5l-2.2-.9L1 8.1 2.8 9.5a7.7 7.7 0 0 0 0 3L1 13.9 2.8 17l2.2-.9a7.5 7.5 0 0 0 2.6 1.5l.5 2.4H12l.5-2.4a7.5 7.5 0 0 0 2.6-1.5l2.2.9 1.8-3.1-1.7-1.4Z" />
          </svg>
          Mehr
        </a>
      </div>
    </nav>
  }
</div>
